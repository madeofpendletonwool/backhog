server {
    listen       80;
    # Bind IPv6 too: inside the container "localhost" resolves to ::1 first, so
    # an IPv4-only listener makes the healthcheck fail against a working server.
    listen       [::]:80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Covers are large; everything else is small JSON.
    client_max_body_size 2m;

    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/javascript application/json
                      image/svg+xml application/manifest+json;

    # Hashed asset filenames are content-addressed, so they can be cached forever.
    location /assets/ {
        expires    1y;
        add_header Cache-Control "public, immutable";
        try_files  $uri =404;
    }

    # index.html must never be cached, or clients pin themselves to a stale
    # bundle after a redeploy.
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files  $uri =404;
    }

    location /api/ {
        proxy_pass         http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Cover downloads can stall on a slow upstream CDN on first request.
        proxy_read_timeout 60s;
    }

    # SPA fallback: unknown paths are client-side routes, not 404s.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
